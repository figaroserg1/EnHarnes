name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pytest

      - name: Static checks (lint + source guard)
        run: make check

      - name: Structural tests (layer boundaries)
        run: make structural

      - name: Doc-drift check (risk-policy.json)
        run: python3 scripts/check_doc_drift.py

      - name: Full test suite
        run: make test
