name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pytest

      - name: Lint (TODO + source + structural)
        run: make lint

      - name: Doc-drift check (risk-policy.json)
        run: python3 .claude/skills/harness.linters/scripts/doc-health/check_doc_drift.py
