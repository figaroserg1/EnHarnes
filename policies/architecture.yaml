# Architecture policy — layer structure for this project.
# Defines layers, allowed imports between them, and code conventions.
#
# Used by:
#   scripts/harness/architecture/test_layer_dependencies.py
#   scripts/harness/code-quality/code_conventions.py
#
# See example/ for a working reference with 7-layer architecture.
# TODO: [AI] Hook to sync from ARCHITECTURE.md automatically.

layers: []
  # - Types
  # - Config
  # - Repo
  # - Service
  # - ...

allowed_imports: {}
  # Types: []
  # Config: [Types]
  # Service: [Repo, Config, Types]
  # ...

cross_cutting_modules: []
  # - auth
  # - logging
  # - tracing

file_size:
  soft_limit: 500
  hard_limit: 1500
