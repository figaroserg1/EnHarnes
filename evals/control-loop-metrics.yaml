version: 1

# Setpoints for agent system health.
# Fill in targets after your first week of real use.
# When a metric crosses alert threshold, treat it as a system problem, not a one-off.

setpoints:
  pr_pass_at_1:
    description: "Fraction of PRs that pass CI on the first run"
    target: 0.70
    alert_below: 0.55

  merge_cycle_time_hours:
    description: "Time from PR open to merge"
    target: 24
    alert_above: 48

  revert_rate:
    description: "Fraction of merged PRs that are reverted"
    target: 0.03
    alert_above: 0.08

  human_intervention_rate:
    description: "Fraction of agent tasks that required human unblocking"
    target: 0.20
    alert_above: 0.40

  time_to_actionable_failure_minutes:
    description: "Time from code push to a clear, readable failure signal in CI"
    target: 10
    alert_above: 30

measurements:
  - name: pr_pass_at_1
    source: ci
  - name: merge_cycle_time_hours
    source: scm
  - name: revert_rate
    source: scm
  - name: human_intervention_rate
    source: review
  - name: time_to_actionable_failure_minutes
    source: ci
